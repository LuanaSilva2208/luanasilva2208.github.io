<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luana Vitória | Portfólio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .pixel-art {
            margin: 30px 0;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto;
        }

        .links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            border: 2px solid var(--accent-color);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Olá, eu sou a Luana Vitória 👋</h1>
        <p>Help Desk Analyst | Transitioning to Software Development</p>
        
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHgmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/L1R1TVr9W5RI83S9sq/giphy.gif" alt="Pixel Art" class="pixel-art">

        <div class="links">
            <a href="https://github.com/LuanaSilva2208" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/luana-vitoria-souza-silva-834025201" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
</html>
