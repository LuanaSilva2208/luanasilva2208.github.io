<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luana Vitória | Portfólio</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 3rem; color: var(--accent); margin: 0; }
        
        .pixel-art {
            width: 300px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        .section {
            width: 90%;
            max-width: 800px;
            padding: 40px 0;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .skill-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #30363d;
            transition: 0.3s;
        }

        .skill-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #30363d;
            width: 100%;
            text-align: center;
        }

        a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Luana Vitória</h1>
        <p>Analista de Help Desk & Desenvolvedora em Transição</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHgmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/L1R1TVr9W5RI83S9sq/giphy.gif" class="pixel-art">
    </header>

    <div class="section">
        <h2>🛠️ Minhas Techs</h2>
        <div class="skills-grid">
            <div class="skill-card">VTEX</div>
            <div class="skill-card">ERP / PDV</div>
            <div class="skill-card">Git & GitHub</div>
            <div class="skill-card">Suporte Técnico</div>
        </div>
    </div>

    <footer>
        <p>Conecte-se comigo: 
            <a href="https://linkedin.com/in/luana-vitoria-souza-silva-834025201">LinkedIn</a> | 
            <a href="https://github.com/LuanaSilva2208">GitHub</a>
        </p>
        <p>© 2026 - Feito com ✨ por Luana</p>
    </footer>

</body>
</html>
